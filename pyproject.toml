[tool.poetry]
package-mode = false

[project]
name = "DynamicDynamiteCitySim"
requires-python = ">=3.13"
dependencies = [
    "pygame (>=2.6.1,<3.0.0)",
    "moderngl (>=5.12.0,<6.0.0)",
    "numpy (>=2.2.3,<3.0.0)",
    "pyobjloader (>=0.0.7,<0.0.8)",
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
